plugins {
    id 'java'
    id 'maven-publish'
    id 'com.enonic.xp.base'
    id 'com.enonic.defaults' version '2.1.6'
}

repositories {
    mavenLocal()
    mavenCentral()
    xp.enonicRepo()
    maven { url "https://jitpack.io" }
}

dependencies {
    compileOnly xplibs.api.script
    implementation 'com.github.kenglxn.QRGen:javase:3.0.1'
}

artifacts {
    archives jar
}
